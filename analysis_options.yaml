include: package:lints/recommended.yaml

# Public API additions get documented in the source via dartdoc
# comments. We don't treat missing API docs as a hard error because
# the hand-authored types are 1:1 mirrors of the OpenAPI spec.
analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

linter:
  rules:
    # Allow `print` in examples / debug paths.
    avoid_print: false
    # Project convention: prefer single quotes for strings.
    prefer_single_quotes: true
